# Non-secret defaults for Parallel-AEO.
# Values here are overridden by environment variables / .env (see aeo.settings).

[app]
host = "127.0.0.1"
port = 8000
log_level = "INFO"
data_dir = "./data"     # runs are stored as folders under {data_dir}/runs/{run_id}/

[orchestrator]
model = "anthropic/claude-opus-4.8"
question_count = 10

[run]
prompt_mode = "single_shot"      # "single_shot" | "per_question"
enable_web_search = false
max_tokens = 8000
concurrency = 6
cost_cap_usd = 5.0
auto_approve_questions = true
max_continuations = 4            # truncation auto-continue cap
ai_insights = true               # LLM synthesis pass for interpretations/quotes

[openrouter]
base_url = "https://openrouter.ai/api/v1"
http_referer = "https://github.com/Vujavujavuja/Parallel-AEO"
x_title = "Parallel-AEO"
timeout_seconds = 120.0
max_retries = 4

# Default fan-out panel. Model ids are validated against the live OpenRouter
# catalog at run time; invalid ids produce a friendly error, not a crash.
[panel]
targets = [
  "openai/gpt-5.5",
  "anthropic/claude-opus-4.8",
  "anthropic/claude-sonnet-5",
  "google/gemini-3.1-pro-preview",
  "google/gemini-3.5-flash",
  "x-ai/grok-4.3",
  "deepseek/deepseek-v4-pro",
  "qwen/qwen3.7-max",
  "mistralai/mistral-large-2512",
  "z-ai/glm-4.7",
]
